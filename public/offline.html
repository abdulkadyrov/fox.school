<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foxy Teacher offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f9fffd;
        color: #2f2d3d;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #e8e1ff;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 60px rgba(15, 118, 110, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Foxy Teacher offline</h1>
      <p>Приложение работает без сети. Откройте сохраненную страницу или вернитесь назад.</p>
    </main>
  </body>
</html>
